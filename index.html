<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>贤琛快跑 - 极简跑酷游戏</title>
    <link rel="icon" type="image/png" href="/birthday_icon.png">
    <!-- Tailwind CSS CDN for minimalist UI styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        stone: {
                            850: '#201c1a',
                        }
                    }
                }
            }
        }
    </script>
    <!-- Custom CSS containing pixel-art crisp rendering config and Google Fonts -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="flex flex-col items-center justify-between min-h-screen p-4 md:p-6 bg-stone-100 select-none overflow-x-hidden text-stone-800">

    <!-- Game Container Wrapper -->
    <div class="w-full max-w-3xl my-auto flex flex-col items-center">
        
        <!-- TOP HEADER & SCOREBOARD -->
        <header class="w-full flex flex-row items-end justify-between mb-4 px-1">
            <div class="flex flex-col">
                <h1 class="text-2xl md:text-3xl font-black tracking-tight text-stone-850 uppercase">
                    贤琛快跑 --生日特别版
                </h1>
                <p class="hidden sm:block text-[11px] text-stone-500 mt-1 font-medium">
                    提示: 长按 [空格/↑/跳跃] 跃得更高，按 [↓/下蹲] 避开空中的阻碍。祝王贤琛生日快乐，一路狂奔！
                </p>
            </div>
            
            <!-- Monospace scoreboard with formatting: 00000 HI 00325 -->
            <div class="flex flex-col items-end">
                <span class="text-[9px] font-bold tracking-widest text-stone-400 uppercase">SCORE</span>
                <div id="scoreboard" class="font-mono-custom text-xl md:text-2xl font-bold tracking-wider text-stone-800">
                    <span id="scoreText">00000</span>
                    <span class="text-stone-400 mx-1.5 text-lg md:text-xl">HI</span>
                    <span id="highScoreText" class="text-stone-600">00325</span>
                </div>
            </div>
        </header>

        <!-- MAIN GAME VIEWPORT -->
        <div class="relative w-full aspect-[2/1] bg-stone-50 border-4 border-stone-850 rounded-xl overflow-hidden shadow-[8px_8px_0px_0px_rgba(32,28,26,0.15)]">
            <!-- Game Canvas -->
            <canvas id="gameCanvas" width="800" height="400" class="w-full h-full block bg-[#eae6e1]"></canvas>
            
            <!-- Ready/Start Overlay Modal (Default Visible) -->
            <div id="startScreen" class="absolute inset-0 flex items-center justify-center bg-stone-900/30 backdrop-blur-[2px] transition-opacity duration-300 p-4">
                <div class="bg-stone-50 border-4 border-stone-850 p-6 md:p-8 rounded-xl max-w-sm w-full text-center shadow-[6px_6px_0px_0px_rgba(32,28,26,1)] animate-fade-in">
                    <div class="inline-block p-2 bg-emerald-50 text-emerald-800 rounded-lg border-2 border-emerald-800/20 mb-3 text-xs font-bold uppercase tracking-wider">
                        🎂 Happy Birthday 🎂
                    </div>
                    <h2 class="text-xl md:text-2xl font-black text-stone-850 mb-3">🎁 王贤琛专属生日挑战 🎁</h2>
                    
                    <!-- Birthday cyber greeting card text -->
                    <p class="text-xs md:text-sm text-emerald-800 bg-emerald-50 border border-emerald-200 rounded-lg p-3 mb-4 leading-relaxed font-semibold text-center">
                        小琛琛生日快乐！准备好迎接我们为你准备的“惊喜”障碍了吗？
                    </p>
                    
                    <!-- Game Instruction List -->
                    <div class="text-left text-xs md:text-sm text-stone-600 space-y-2 mb-6 bg-stone-100 p-3.5 rounded-lg border-2 border-stone-200 font-medium leading-relaxed">
                        <div class="flex items-center gap-2">
                            <span class="w-5 h-5 flex items-center justify-center bg-stone-800 text-stone-50 rounded text-[10px] font-mono">Space</span>
                            <span>或</span>
                            <span class="w-5 h-5 flex items-center justify-center bg-stone-800 text-stone-50 rounded text-[10px]">↑</span>
                            <span>控制主角跳跃 (支持长按高跳)</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="w-5 h-5 flex items-center justify-center bg-stone-800 text-stone-50 rounded text-[10px]">↓</span>
                            <span>控制下蹲躲避高空袭来的障碍物</span>
                        </div>
                        <div class="pt-1 text-[11px] text-stone-500 border-t border-stone-200">
                            * 触屏设备请使用下方的两个大触控按钮。
                        </div>
                    </div>

                    <!-- Green Start Button -->
                    <button id="startButton" class="w-full py-3 bg-emerald-700 hover:bg-emerald-800 text-stone-100 font-extrabold text-sm md:text-base border-3 border-stone-850 rounded-xl shadow-[4px_4px_0px_0px_rgba(32,28,26,1)] hover:translate-y-[-2px] hover:shadow-[6px_6px_0px_0px_rgba(32,28,26,1)] active:translate-y-[2px] active:shadow-[2px_2px_0px_0px_rgba(32,28,26,1)] transition-all uppercase tracking-wider">
                        开启生日狂奔
                    </button>
                </div>
            </div>

            <!-- Game Over Overlay Modal (Default Hidden) -->
            <div id="gameOverScreen" class="absolute inset-0 hidden flex items-center justify-center bg-stone-900/35 backdrop-blur-[2px] p-4">
                <div class="bg-stone-50 border-4 border-stone-850 p-6 md:p-8 rounded-xl max-w-xs w-full text-center shadow-[6px_6px_0px_0px_rgba(32,28,26,1)]">
                    <div id="gameOverSubTitle" class="inline-block p-1.5 bg-red-100 text-red-700 rounded-lg border border-red-200 mb-2 text-xs font-black uppercase tracking-wider">
                        Game Over
                    </div>
                    <h2 id="gameOverTitle" class="text-xl md:text-2xl font-black text-red-600 mb-2">游戏结束</h2>
                    
                    <p class="text-sm text-stone-600 mb-6">
                        你的最终得分<br>
                        <span id="finalScore" class="font-mono-custom font-extrabold text-stone-850 text-2xl tracking-wider">00000</span>
                    </p>
                    
                    <!-- Restart Button -->
                    <button id="restartButton" class="w-full py-3 bg-stone-700 hover:bg-stone-800 text-stone-100 font-extrabold text-sm md:text-base border-3 border-stone-850 rounded-xl shadow-[4px_4px_0px_0px_rgba(32,28,26,1)] hover:translate-y-[-2px] hover:shadow-[6px_6px_0px_0px_rgba(32,28,26,1)] active:translate-y-[2px] active:shadow-[2px_2px_0px_0px_rgba(32,28,26,1)] transition-all uppercase tracking-wider">
                        重新开始
                    </button>
                </div>
            </div>
        </div>

        <!-- BOTTOM TOUCH BUTTONS (PC visible too for dev testing and aesthetic balancing) -->
        <div class="w-full flex flex-row justify-between gap-4 md:gap-6 mt-6 px-1">
            <!-- Large Rounded Jump Button -->
            <button id="mobileJump" class="flex-1 py-5 md:py-6 bg-emerald-700 active:bg-emerald-800 hover:bg-emerald-750 text-stone-50 font-black text-lg md:text-xl rounded-2xl border-4 border-stone-850 shadow-[4px_4px_0px_0px_rgba(32,28,26,1)] active:translate-y-[3px] active:shadow-[1px_1px_0px_0px_rgba(32,28,26,1)] transition-all select-none touch-manipulation uppercase tracking-wider">
                跳跃 (JUMP)
            </button>
            <!-- Large Rounded Crouch Button -->
            <button id="mobileCrouch" class="flex-1 py-5 md:py-6 bg-stone-600 active:bg-stone-700 hover:bg-stone-650 text-stone-50 font-black text-lg md:text-xl rounded-2xl border-4 border-stone-850 shadow-[4px_4px_0px_0px_rgba(32,28,26,1)] active:translate-y-[3px] active:shadow-[1px_1px_0px_0px_rgba(32,28,26,1)] transition-all select-none touch-manipulation uppercase tracking-wider">
                下蹲 (DUCK)
            </button>
        </div>

        <!-- Footer / Credits -->
        <footer class="mt-8 text-[10px] text-stone-400 font-medium tracking-wide">
            © 2026 献给小琛琛的生日礼物 💖
        </footer>

    </div>

    <!-- Core Game Logic script imported as ES Module -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
